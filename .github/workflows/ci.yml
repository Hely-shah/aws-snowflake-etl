name: ELT Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  data-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run data quality checks
        run: python data_quality_checks.py

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --max-line-length=120 --exclude=.git --statistics
